<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b13"/>
      <stop offset="50%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#f97316" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g filter="url(#shadow)" transform="translate(110, 170)">
    <image href="/logo.jpg" x="0" y="0" width="520" height="170" preserveAspectRatio="xMinYMin meet"/>
  </g>

  <!-- Title -->
  <g transform="translate(110, 390)" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#f1f5f9">
    <text x="0" y="0" font-size="56" font-weight="900" letter-spacing="-1">AI-Powered Prediction Market Bot</text>
    <text x="0" y="64" font-size="28" font-weight="600" fill="#94a3b8">Local-first · Non-custodial · Pay-per-use via SkillPay</text>
  </g>

  <!-- Corner tag -->
  <g transform="translate(980, 54)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <rect x="0" y="0" rx="14" ry="14" width="170" height="44" fill="rgba(249,115,22,0.14)" stroke="rgba(249,115,22,0.35)"/>
    <text x="20" y="29" font-size="18" font-weight="700" fill="#fb923c">iearn.bot</text>
  </g>
</svg>
