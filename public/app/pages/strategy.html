<!-- Strategy Page — Module C (v0.4) -->
<div class="section-title">AI Strategy Generator</div>

<!-- ── Input Section ── -->
<div class="input-section card">
  <div class="input-label">📎 Article / Post URL</div>
  <input type="url" id="article-url"
    placeholder="Paste X, YouTube, or any link..."
    class="mobile-input" />
  <button class="fetch-btn" onclick="fetchArticle()">Fetch Content</button>

  <div class="divider-text">or paste text directly</div>

  <textarea id="article-text"
    placeholder="Paste article, strategy idea, or describe what you want..."
    class="mobile-textarea" rows="6"></textarea>

  <div class="input-label" style="margin-top:8px">🌍 Target Market</div>
  <select id="market-select" class="mobile-select">
    <option value="polymarket">Polymarket</option>
    <option value="kalshi">Kalshi (Coming Soon)</option>
    <option value="binance">Binance (Coming Soon)</option>
  </select>

  <button class="generate-btn" onclick="generateStrategy()" id="gen-btn">
    ✨ Generate Strategy
  </button>
</div>

<!-- ── Result Section (hidden until generated) ── -->
<div id="strategy-result" style="display:none;margin-top:12px">

  <div class="result-header">
    <div class="result-name" id="result-name">Strategy V4</div>
    <div class="result-desc" id="result-desc"></div>
  </div>

  <!-- Key Parameters -->
  <div class="param-section">
    <div class="param-title">⚙️ Key Parameters</div>
    <div class="param-grid" id="param-grid"></div>
  </div>

  <!-- Risk Controls -->
  <div class="risk-section">
    <div class="risk-title">🛡️ Risk Controls</div>
    <div class="risk-grid" id="risk-grid"></div>
  </div>

  <!-- Actions -->
  <div class="result-actions">
    <button class="action-btn primary" onclick="deployStrategy()">▶ Deploy to Mac</button>
    <button class="action-btn ghost" onclick="shareStrategy()">📤 Share</button>
  </div>
</div>

<!-- ── Quick Examples ── -->
<div class="section-title" style="margin-top:16px">Quick Examples</div>
<div class="card">
  <div style="display:flex;flex-direction:column;gap:8px">
    <button class="btn btn-secondary" onclick="setExample('BTC breaks $90k — buy YES on crypto price markets. Take profit 80¢, stop loss 30¢, max 5 positions, $10 each.')">
      📈 BTC Bull Run
    </button>
    <button class="btn btn-secondary" onclick="setExample('US election 2024 results — high-liquidity political markets. Buy YES on leading candidate when polling gap > 5%. Exit at 75¢.')">
      🗳️ Political Market
    </button>
    <button class="btn btn-secondary" onclick="setExample('Fed rate cut probability — macro markets. Buy YES when CME FedWatch shows >70% chance. Tight stop at 40¢.')">
      🏦 Macro Event
    </button>
  </div>
</div>

<script>
// ── Strategy System Prompt (mirrors strategy_ai.py SYSTEM_PROMPT) ────────
const STRATEGY_SYSTEM_PROMPT = `You are an expert Polymarket trading strategy designer.
Given a plain-English description or article, output a JSON strategy object with these fields:
{
  "name": "V4_<short_name>",
  "description": "...",
  "entry": {
    "trigger": "...",
    "min_liquidity": 5000,
    "max_spread": 0.05,
    "categories": ["crypto"]
  },
  "position": {
    "side": "YES",
    "size_usdc": 10,
    "max_positions": 5
  },
  "exit": {
    "take_profit": 0.75,
    "stop_loss": 0.30,
    "resolve_redeem": true
  },
  "risk": {
    "daily_loss_limit_usdc": 50,
    "max_drawdown_pct": 0.20,
    "kill_switch_on_loss": true,
    "max_exposure_usdc": 100
  },
  "schedule": "*/15 * * * *"
}
Return ONLY valid JSON, no markdown, no explanation.`

// ── State ────────────────────────────────────────────────────────────────
let _lastStrategy = null

// ── Set example text ─────────────────────────────────────────────────────
function setExample(text) {
  document.getElementById('article-text').value = text
  document.getElementById('article-url').value = ''
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

// ── Fetch article URL ─────────────────────────────────────────────────────
async function fetchArticle() {
  const urlInput = document.getElementById('article-url')
  const url = urlInput.value.trim()
  if (!url) { toast('Please enter a URL first', 'info'); return }

  const btn = document.querySelector('.fetch-btn')
  btn.textContent = '⏳ Fetching…'
  btn.disabled = true

  try {
    const r = await fetch('https://iearn.bot/api/fetch-url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    })
    const d = await r.json()
    if (d.ok && d.content) {
      document.getElementById('article-text').value = d.content.slice(0, 3000)
      toast('✅ Content fetched', 'success')
    } else {
      toast('Could not fetch — paste text manually', 'info')
    }
  } catch (e) {
    toast('Fetch failed — paste text manually', 'info')
  } finally {
    btn.textContent = 'Fetch Content'
    btn.disabled = false
  }
}

// ── Generate strategy ────────────────────────────────────────────────────
async function generateStrategy() {
  const urlVal  = document.getElementById('article-url').value.trim()
  const textVal = document.getElementById('article-text').value.trim()
  const btn     = document.getElementById('gen-btn')

  if (!urlVal && !textVal) {
    toast('Please enter a URL or paste some text', 'info')
    return
  }

  btn.disabled = true
  btn.textContent = '⏳ Generating…'

  // Hide previous result
  const resultDiv = document.getElementById('strategy-result')
  resultDiv.style.display = 'none'

  let content = textVal

  // Try fetch URL first
  if (urlVal) {
    try {
      const r = await fetch('https://iearn.bot/api/fetch-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: urlVal })
      })
      const d = await r.json()
      if (d.ok && d.content) content = d.content + '\n' + textVal
    } catch (e) { /* silent — use pasted text */ }
  }

  if (!content.trim()) {
    toast('No content to process', 'error')
    btn.disabled = false
    btn.textContent = '✨ Generate Strategy'
    return
  }

  try {
    const r = await fetch('https://iearn.bot/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: STRATEGY_SYSTEM_PROMPT },
          { role: 'user',   content: content }
        ],
        user_id:   localStorage.getItem('skillpay_user_id') || '',
        free_tier: !localStorage.getItem('skillpay_user_id')
      })
    })
    const d = await r.json()

    if (d.ok) {
      let strategy
      try {
        strategy = typeof d.content === 'string' ? JSON.parse(d.content) : d.content
      } catch (parseErr) {
        // Try extracting JSON from markdown code block
        const match = (d.content || '').match(/```(?:json)?\s*([\s\S]+?)```/)
        strategy = match ? JSON.parse(match[1]) : null
      }

      if (strategy) {
        renderStrategyResult(strategy)
        toast('✅ Strategy generated!', 'success')
      } else {
        toast('AI returned unexpected format', 'error')
      }
    } else {
      toast(d.error || 'Generation failed', 'error')
    }
  } catch (e) {
    toast('Network error: ' + e.message, 'error')
  } finally {
    btn.disabled = false
    btn.textContent = '✨ Generate Strategy'
  }
}

// ── Render result ────────────────────────────────────────────────────────
function renderStrategyResult(strategy) {
  _lastStrategy = strategy

  document.getElementById('result-name').textContent = strategy.name || 'Strategy V4'
  document.getElementById('result-desc').textContent = strategy.description || ''

  // Key parameters
  const paramGrid = document.getElementById('param-grid')
  const params = []
  if (strategy.entry) {
    if (strategy.entry.trigger)       params.push(['Trigger',        strategy.entry.trigger])
    if (strategy.entry.min_liquidity) params.push(['Min Liquidity',  '$' + strategy.entry.min_liquidity.toLocaleString()])
    if (strategy.entry.max_spread)    params.push(['Max Spread',     (strategy.entry.max_spread * 100).toFixed(1) + '%'])
    if (strategy.entry.categories?.length) params.push(['Categories', strategy.entry.categories.join(', ')])
  }
  if (strategy.position) {
    if (strategy.position.side)          params.push(['Side',         strategy.position.side])
    if (strategy.position.size_usdc)     params.push(['Position Size','$' + strategy.position.size_usdc])
    if (strategy.position.max_positions) params.push(['Max Positions', strategy.position.max_positions])
  }
  if (strategy.exit) {
    if (strategy.exit.take_profit) params.push(['Take Profit', (strategy.exit.take_profit * 100).toFixed(0) + '¢'])
  }
  if (strategy.schedule) params.push(['Scan Interval', strategy.schedule])

  paramGrid.innerHTML = params.map(([k, v]) =>
    `<div class="param-row"><span style="color:var(--text-muted)">${k}</span><span style="font-weight:600">${v}</span></div>`
  ).join('')

  // Risk controls
  const riskGrid = document.getElementById('risk-grid')
  const risks = []
  if (strategy.exit) {
    if (strategy.exit.stop_loss)     risks.push(['Stop Loss',          (strategy.exit.stop_loss * 100).toFixed(0) + '¢'])
    if (strategy.exit.resolve_redeem !== undefined)
      risks.push(['Auto-Redeem on Resolve', strategy.exit.resolve_redeem ? 'Yes' : 'No'])
  }
  if (strategy.risk) {
    const r = strategy.risk
    if (r.daily_loss_limit_usdc) risks.push(['Daily Loss Limit',   '$' + r.daily_loss_limit_usdc])
    if (r.max_drawdown_pct)      risks.push(['Max Drawdown',       (r.max_drawdown_pct * 100).toFixed(0) + '%'])
    if (r.max_exposure_usdc)     risks.push(['Max Exposure',       '$' + r.max_exposure_usdc])
    if (r.kill_switch_on_loss !== undefined)
      risks.push(['Kill Switch on Loss',   r.kill_switch_on_loss ? '✅ Enabled' : '❌ Disabled'])
  }

  riskGrid.innerHTML = risks.length
    ? risks.map(([k, v]) =>
        `<div class="param-row"><span style="color:var(--text-muted)">${k}</span><span style="font-weight:600;color:var(--red)">${v}</span></div>`
      ).join('')
    : '<div style="color:var(--text-muted);font-size:.85rem">No explicit risk controls returned.</div>'

  document.getElementById('strategy-result').style.display = 'block'
  document.getElementById('strategy-result').scrollIntoView({ behavior: 'smooth', block: 'start' })
}

// ── Deploy to Mac ────────────────────────────────────────────────────────
async function deployStrategy() {
  if (!_lastStrategy) { toast('No strategy to deploy', 'info'); return }
  const serverUrl = localStorage.getItem('server_url') || 'http://localhost:7799'
  try {
    const r = await fetch(serverUrl.replace(/\/$/, '') + '/api/strategy/deploy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_lastStrategy)
    })
    if (r.ok) {
      toast('🚀 Strategy deployed to Mac!', 'success', 4000)
    } else {
      toast('Deploy failed: HTTP ' + r.status, 'error')
    }
  } catch (e) {
    toast('Cannot reach Mac mini — check Settings', 'error')
  }
}

// ── Share ────────────────────────────────────────────────────────────────
function shareStrategy() {
  if (!_lastStrategy) { toast('No strategy to share', 'info'); return }
  const text = JSON.stringify(_lastStrategy, null, 2)
  if (navigator.share) {
    navigator.share({ title: _lastStrategy.name || 'iEarnBot Strategy', text })
      .catch(() => {})
  } else {
    navigator.clipboard?.writeText(text)
      .then(() => toast('📋 Copied to clipboard', 'success'))
      .catch(() => toast('Copy not supported', 'info'))
  }
}
</script>
