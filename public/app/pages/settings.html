<!-- Settings Page -->
<div class="section-title">Settings</div>

<!-- Server Connection -->
<div class="card">
  <div class="card-title" style="margin-bottom:14px">Server Connection</div>

  <div class="form-group">
    <label class="form-label" for="settings-server-url">Server URL</label>
    <input
      type="url"
      id="settings-server-url"
      class="form-input"
      placeholder="http://localhost:7799"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
    />
    <div class="form-hint">Your iEarnBot server address (Mac mini IP or ngrok URL)</div>
  </div>

  <div class="form-group">
    <label class="form-label" for="settings-api-key">API Key</label>
    <input
      type="password"
      id="settings-api-key"
      class="form-input"
      placeholder="Optional — leave blank if not set"
      autocomplete="current-password"
    />
    <div class="form-hint">Set in iEranBot config if authentication is enabled</div>
  </div>

  <div style="display:flex;gap:10px">
    <button id="settings-save" class="btn btn-primary" style="flex:2">
      💾 Save Settings
    </button>
    <button id="settings-test" class="btn btn-secondary" style="flex:1">
      Test Connection
    </button>
  </div>
</div>

<!-- Quick Server Presets -->
<div class="card">
  <div class="card-title" style="margin-bottom:12px">Quick Presets</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <button class="btn btn-secondary" onclick="setServer('http://localhost:7799')">
      🖥️ localhost:7799
    </button>
    <button class="btn btn-secondary" onclick="document.getElementById('settings-server-url').focus()">
      🌐 Custom URL…
    </button>
  </div>
</div>

<!-- App Info -->
<div class="card">
  <div class="card-title" style="margin-bottom:12px">About</div>
  <div class="stat-row">
    <span class="key">App</span>
    <span class="val">iEarn.Bot PWA</span>
  </div>
  <div class="stat-row">
    <span class="key">Version</span>
    <span class="val">v0.4.0</span>
  </div>
  <div class="stat-row">
    <span class="key">Cache</span>
    <span class="val" id="cache-version">iearnbot-v1</span>
  </div>
</div>

<!-- Clear Cache -->
<button class="btn btn-danger" id="clear-cache-btn">
  🗑️ Clear Cache &amp; Reload
</button>

<div style="height:8px"></div>

<script>
function setServer(url) {
  const input = document.getElementById('settings-server-url')
  if (input) input.value = url
}

const clearBtn = document.getElementById('clear-cache-btn')
if (clearBtn) {
  clearBtn.addEventListener('click', async () => {
    if ('caches' in window) {
      const keys = await caches.keys()
      await Promise.all(keys.map(k => caches.delete(k)))
    }
    window.location.reload(true)
  })
}
</script>
