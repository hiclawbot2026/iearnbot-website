<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="iEarnBot" />
  <meta name="theme-color" content="#f97316" />
  <meta name="description" content="AI Trading Strategy Manager" />

  <title>iEarn.Bot</title>

  <link rel="manifest" href="/app/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="stylesheet" href="/app/app.css" />
</head>
<body>
  <div id="app">

    <!-- ── Top Status Bar ── -->
    <header class="top-bar">
      <div class="top-bar__brand">
        <a href="/app/" style="display:flex;align-items:center;text-decoration:none">
          <svg viewBox="0 0 210 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:30px;width:auto">
            <path d="M22 3C16 9 8 16 8 26c0 11 8 19 17 19s17-8 17-19c0-7-4-13-9-17 0 7-3 11-7 13 2-5 0-12-4-19z" fill="#f97316"/>
            <path d="M25 13c-3 5-7 9-7 15 0 5 3 9 7 9s7-4 7-9c0-5-2-8-4-10 0 3-2 5-4 6 1-3 1-7 1-11z" fill="#fff7ed" opacity="0.55"/>
            <circle cx="25" cy="39" r="2.5" fill="#fb923c" opacity="0.7"/>
            <text x="50" y="35" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="25" fill="#f1f5f9" letter-spacing="-0.5">iEarn</text>
            <text x="122" y="35" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="25" fill="#f97316">.</text>
            <text x="130" y="35" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="25" fill="#f97316">Bot</text>
          </svg>
        </a>
      </div>
      <div class="top-bar__status">
        <div class="status-badge">
          <div id="status-dot" class="status-dot"></div>
          <span id="status-label">Unknown</span>
        </div>
        <div id="balance-display" class="balance-display">
          <span>Balance</span> —
        </div>
        <!-- Language Selector -->
        <div class="lang-selector" id="langSelector">
          <button class="lang-btn" id="langBtn" onclick="toggleLangMenu()">
            🇺🇸 EN <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style="margin-left:4px"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="lang-menu" id="langMenu">
            <div class="lang-option" onclick="setAppLang('en')">🇺🇸 English</div>
            <div class="lang-option" onclick="setAppLang('zh')">🇨🇳 中文</div>
            <div class="lang-option" onclick="setAppLang('ja')">🇯🇵 日本語</div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Page Content ── -->
    <main id="page-content">
      <!-- Loaded dynamically by app.js -->
      <div style="padding:60px;text-align:center">
        <div class="spinner"></div>
      </div>
    </main>

    <!-- ── Toast Container ── -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ── Bottom Tab Bar ── -->
    <nav class="tab-bar">
      <div class="tab-item active" data-page="dashboard" data-i18n-tab="tab_dashboard">
        <span class="icon">📊</span>
        <span class="tab-label">Dashboard</span>
      </div>
      <div class="tab-item" data-page="strategy" data-i18n-tab="tab_strategy">
        <span class="icon">🤖</span>
        <span class="tab-label">Strategy</span>
      </div>
      <div class="tab-item" data-page="positions" data-i18n-tab="tab_positions">
        <span class="icon">💼</span>
        <span class="tab-label">Positions</span>
      </div>
      <div class="tab-item" data-page="logs" data-i18n-tab="tab_logs">
        <span class="icon">📋</span>
        <span class="tab-label">Logs</span>
      </div>
      <div class="tab-item" data-page="settings" data-i18n-tab="tab_settings">
        <span class="icon">⚙️</span>
        <span class="tab-label">Settings</span>
      </div>
    </nav>

  </div>

  <script src="/app/app.js"></script>
</body>
</html>
